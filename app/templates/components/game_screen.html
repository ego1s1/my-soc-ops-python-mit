<div id="game-container">
<div class="flex flex-col min-h-full">
    <!-- Header -->
    <header class="flex items-center justify-between p-4 bg-black border-b-4 border-cyan">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="pixel-btn text-xs">
            ← BACK
        </button>
        <h1 class="font-bold text-cyan neon-glow">SOC OPS</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-magenta text-xs py-3 px-4 bg-gray">
        TAP A SQUARE WHEN YOU FIND SOMEONE WHO MATCHES IT.
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-yellow text-black text-center py-3 font-bold text-sm flicker pulse">
        🎉 BINGO! YOU GOT A LINE! 🎉
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-4">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
