<div class="grid grid-cols-5 gap-2 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-2 text-center border-4 rounded-none select-none min-h-[60px] text-xs leading-tight
        {%- if square.is_marked %}
            {%- if is_winning %} bg-yellow border-yellow text-black font-bold flicker
            {%- else %} bg-green border-green text-black font-bold
            {%- endif %}
        {%- else %} bg-black border-gray text-cyan hover:border-cyan
        {%- endif %}
        {%- if square.is_free_space %} bg-magenta border-magenta text-black font-bold{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-1 right-1 text-black text-xs font-bold">✓</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
